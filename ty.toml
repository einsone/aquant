# ty 类型检查配置
# 文档: https://docs.astral.sh/ty/reference/configuration/

[environment]
    python-version = "3.12"

[src]
    respect-ignore-files = true # 是否遵循 .gitignore 等忽略文件

[terminal]
    error-on-warning = false  # 是否将 warning 视为非零退出
    output-format    = "full" # 诊断输出格式: full | concise | github | gitlab | junit

[analysis]
    respect-type-ignore-comments = true # 是否尊重 `# type: ignore` 注释

[rules]

[[overrides]]
    include = ["aquant/data/alds.py"]
    rules   = { unresolved-import = "ignore" }

[[overrides]]
    include = ["aquant/live/engine.py", "aquant/live/order_manager.py"]
    rules   = { unresolved-import = "ignore", unresolved-attribute = "ignore" }

[[overrides]]
    include = ["aquant/cli.py"]
    rules   = { unresolved-import = "ignore" }

[[overrides]]
    include = ["aquant/optimization/grid_search.py", "aquant/optimization/walk_forward.py"]
    rules   = { invalid-assignment = "ignore" }

[[overrides]]
    include = ["aquant/tools/data_tools.py"]
    rules   = { unresolved-import = "ignore", missing-argument = "ignore", unresolved-attribute = "ignore" }

[[overrides]]
    include = ["aquant/optimization/genetic_algorithm.py"]
    rules   = { unresolved-attribute = "ignore", unknown-argument = "ignore" }

[[overrides]]
    include = ["benchmarks/parallel_backtest.py"]
    rules   = { unresolved-attribute = "ignore" }

[[overrides]]
    include = ["examples/tools_demo.py"]
    rules   = { missing-argument = "ignore", unresolved-attribute = "ignore", unresolved-import = "ignore" }

[[overrides]]
    include = ["tests/test_grid_search.py", "tests/test_walk_forward.py"]
    rules   = { unresolved-attribute = "ignore" }

[[overrides]]
    include = ["aquant/tools/profiler.py"]
    rules   = { unresolved-attribute = "ignore", invalid-assignment = "ignore" }

[[overrides]]
    include = ["aquant/tools/strategy_analyzer.py"]
    rules   = { unresolved-import = "ignore" }
