# Ruff 配置文件
# 文档: https://docs.astral.sh/ruff/configuration/

# 目标 Python 版本
target-version = "py312"

# 行宽限制
line-length = 300

# 排除目录
exclude = ["*.egg-info", ".git", ".mypy_cache", ".pytest_cache", ".venv", "__pycache__", "build", "dist", "node_modules", "venv"]

# 缓存目录
cache-dir = ".ruff_cache"

[lint]
    # 启用的规则集
    select = [
        "B",   # flake8-bugbear
        "C4",  # flake8-comprehensions
        "E",   # pycodestyle errors
        "F",   # Pyflakes
        "I",   # isort
        "PTH", # flake8-use-pathlib
        "RUF", # Ruff 特有规则
        "SIM", # flake8-simplify
        "TCH", # flake8-type-checking
        "UP",  # pyupgrade
        "W",   # pycodestyle warnings
    ]

    # 忽略的规则
    ignore = [
        "B008",   # 函数调用作为默认参数 (FastAPI Depends 常用)
        "B905",   # zip without strict (Python 3.10+ 特性)
        "E501",   # 行过长 (由 formatter 处理)
        "RUF001", # 中文全角标点 (中文注释/文档字符串/描述文本中使用)
        "RUF002", # 中文全角标点 (中文注释/文档字符串中使用)
        "RUF003", # 中文全角标点 (中文注释/文档字符串中使用)
    ]

    # 允许自动修复的规则
    fixable = ["ALL"]

    # 禁止自动修复的规则
    unfixable = []

    # 允许的未使用变量 (如占位符)
    dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
    # 测试文件可以使用 assert
    "**/*_test.py"  = ["S101"]
    "**/test_*.py"  = ["S101"]
    "tests/**/*.py" = ["S101"]
    # 实盘引擎需要在运行时访问 RiskGuard 类型
    "aquant/live/engine.py" = ["TC004"]
    # 工具模块使用传统 open() 处理缓存
    "aquant/tools/data_tools.py" = ["PTH123"]

[lint.isort]
    # import 排序配置
    combine-as-imports      = true
    force-single-line       = false
    known-first-party       = []
    lines-after-imports     = 2
    split-on-trailing-comma = false

[lint.flake8-bugbear]
    # 允许函数调用作为默认参数的函数
    extend-immutable-calls = ["fastapi.Body", "fastapi.Depends", "fastapi.Path", "fastapi.Query"]

[lint.flake8-type-checking]
    # 运行时需要的类型注解
    runtime-evaluated-base-classes = ["pydantic.BaseModel"]
    # 在运行时被实例化和操作的内部类，不应移进 TYPE_CHECKING
    exempt-modules = ["aquant.adjustment.corporate", "aquant.data.source", "aquant.matching.cost", "datetime"]

[format]
    # 格式化配置
    docstring-code-format      = true
    docstring-code-line-length = "dynamic"
    indent-style               = "space"
    line-ending                = "auto"
    quote-style                = "double"
    skip-magic-trailing-comma  = true
