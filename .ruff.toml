# Ruff 配置文件
# 文档: https://docs.astral.sh/ruff/configuration/

# 目标 Python 版本
target-version = "py312"

# 行宽限制
line-length = 88

# 排除目录
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    "build",
    "dist",
    "*.egg-info",
    "node_modules",
]

# 缓存目录
cache-dir = ".ruff_cache"

[lint]
# 启用的规则集
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "RUF",    # Ruff 特有规则
]

# 忽略的规则
ignore = [
    "E501",   # 行过长 (由 formatter 处理)
    "B008",   # 函数调用作为默认参数 (FastAPI Depends 常用)
    "B905",   # zip without strict (Python 3.10+ 特性)
    "RUF002", # 中文全角标点 (中文注释/文档字符串中使用)
    "RUF003", # 中文全角标点 (中文注释/文档字符串中使用)
]

# 允许自动修复的规则
fixable = ["ALL"]

# 禁止自动修复的规则
unfixable = []

# 允许的未使用变量 (如占位符)
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# 测试文件可以使用 assert
"**/test_*.py" = ["S101"]
"**/*_test.py" = ["S101"]
"tests/**/*.py" = ["S101"]

[lint.isort]
# import 排序配置
known-first-party = []
force-single-line = false
lines-after-imports = 2
combine-as-imports = true

[lint.flake8-bugbear]
# 允许函数调用作为默认参数的函数
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]

[lint.flake8-type-checking]
# 运行时需要的类型注解
runtime-evaluated-base-classes = ["pydantic.BaseModel"]

[format]
# 格式化配置
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
